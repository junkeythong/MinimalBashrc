name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Shell tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run tests
        run: env -u WORKON_HOME bash tests/test_my_bashrc.sh
